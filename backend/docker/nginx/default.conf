server {
  listen 80;
  server_name _;
  # PATCH /api/owners/me с base64 баннером/аватаром — иначе nginx отдаёт 413 и сохранение «молча» ломается
  client_max_body_size 32m;
  root /var/www/html/public;

  index index.php index.html;

  # Старый Vite base «./»: с /car/{id}/history чанки запрашиваются как /car/{id}/assets/*.js — отдаём из /assets/.
  location ~ ^/car/[0-9]+/assets/(.+)$ {
    alias /var/www/html/public/assets/$1;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Vite-чанки: только файлы из public/assets. Нет файла (старый хеш) → 404 nginx, не index.php (иначе HTML вместо JS).
  location ^~ /assets/ {
    try_files $uri =404;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Свежие ссылки на чанки после каждого деплоя — не отдавать старый index.html из CDN/браузера (в т.ч. Яндекс).
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.php?$query_string;
  }

  location ~ \.php$ {
    try_files $uri =404;
    fastcgi_split_path_info ^(.+\.php)(/.+)$;
    fastcgi_pass backend:9000;
    fastcgi_index index.php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param PATH_INFO $fastcgi_path_info;
  }
}

