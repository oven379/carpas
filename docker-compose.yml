services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: car_passport
      POSTGRES_USER: car_passport
      POSTGRES_PASSWORD: car_passport
    ports:
      # Внешний порт 5433, если локальный PostgreSQL уже слушает 5432
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U car_passport -d car_passport"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6378:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: car_passport
      DB_USERNAME: car_passport
      DB_PASSWORD: car_passport
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./backend:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      # 8080 часто занят на Windows — 8088 снижает конфликты; Vite прокси смотрит сюда же
      - "8088:80"
    volumes:
      - ./backend:/var/www/html
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  # Фронт в Docker: Vite → прокси /api на сервис nginx (см. VITE_DEV_PROXY_TARGET и vite.config.js)
  # Debian/glibc: Vite 8 + Rolldown требуют нативный binding; в Alpine (musl) npm ci часто не ставит @rolldown/binding-linux-x64-musl.
  vite:
    image: node:22-bookworm-slim
    working_dir: /app
    ports:
      # Если локально уже запущен `npm run dev` (занят 5173), задайте VITE_PUBLISH_PORT=5174
      - "${VITE_PUBLISH_PORT:-5173}:5173"
    environment:
      VITE_DEV_PROXY_TARGET: http://nginx
    volumes:
      - .:/app
      - vite_node_modules:/app/node_modules
    # После npm ci доустанавливаем Rolldown binding для Linux (npm/cli#4828 — optional deps).
    command: sh -c "npm ci && npm install @rolldown/binding-linux-x64-gnu@1.0.0-rc.13 --no-save && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - nginx

volumes:
  db_data:
  vite_node_modules:

