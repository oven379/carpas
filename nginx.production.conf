upstream carpasss_back {
    server 127.0.0.1:8088;
    keepalive 16;
}

# Фронт
server {
    listen 443 ssl http2 default_server;
    server_name carpasss.ru www.carpasss.ru;

    root /var/www/carpas/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/carpasss.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/carpasss.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # OCSP stapling — iOS не делает внешний запрос к Let's Encrypt при каждом handshake
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/carpasss.ru/chain.pem;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # HSTS — браузер запоминает что сайт только HTTPS; includeSubDomains покрывает back.carpasss.ru
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite-чанки с хешами в имени файла — можно кешировать навсегда
    location ~* ^/assets/.*\.(js|css|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Статичные иконки и картинки из dist (не пользовательские медиа)
    location ~* ^/(favicon|logo|icon).*\.(png|svg|ico|webp|gif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
        try_files $uri =404;
    }

    # Прочие статичные файлы из dist
    location ~* \.(js|css|png|jpg|jpeg|webp|svg|ico|woff|woff2|ttf|gif)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        access_log off;
        try_files $uri =404;
    }

    # SPA-точка входа: no-cache чтобы после деплоя браузер не показывал старый HTML со старыми хешами чанков
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
}

# Бэкенд API
server {
    listen 443 ssl http2;
    server_name back.carpasss.ru;

    ssl_certificate /etc/letsencrypt/live/carpasss.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/carpasss.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/carpasss.ru/chain.pem;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass http://carpasss_back;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        client_max_body_size 32m;
    }
}

# HTTP → HTTPS редирект
server {
    listen 80;
    server_name carpasss.ru www.carpasss.ru back.carpasss.ru;
    return 301 https://$host$request_uri;
}
